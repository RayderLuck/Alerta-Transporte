<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protótipo Transporte com GPS</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
  <style>
    body { background:#111; color:#0f0; font-family:Arial; text-align:center; margin:0; padding:20px; }
    h1 { color:#ff0; }
    #map { width:100%; height:300px; max-width:800px; margin:20px auto; border:2px solid #0f0; border-radius:8px; }
    #resultado { margin-top:20px; font-size:1.2rem; color:#ff0; }
    #cronometro { margin-top:10px; font-size:1rem; color:#0ff; }
    select, button { margin:10px; padding:8px; border:none; border-radius:5px; cursor:pointer; }
    button { background:#0f0; color:#111; font-weight:bold; }
  </style>
</head>
<body>
  <h1>🚍 Protótipo Transporte com GPS</h1>
  <p>Ative o GPS e escolha a linha para ver os horários no ponto mais próximo.</p>

  <div>
    <label for="linhaSelect">Linha:</label>
    <select id="linhaSelect">
      <option value="cabo-arraial">Cabo Frio ↔ Arraial</option>
      <option value="cabo-buzios">Cabo Frio ↔ Búzios</option>
      <option value="cabo-tangara">Cabo Frio ↔ Tangará</option>
    </select>
  </div>

  <button onclick="ativarGPS()">📍 Ativar GPS em tempo real</button>

  <div id="map"></div>
  <div id="resultado">Clique em "Ativar GPS" e escolha uma linha.</div>
  <div id="cronometro"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
  <script src="script.js"></script>
</body>
</html>
