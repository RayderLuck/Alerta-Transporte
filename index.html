<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulação Ônibus</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #0f0;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #ff0;
    }

    #container {
      position: relative;
      width: 400px;
      height: 400px;
      margin: 20px auto;
      border: 2px solid #0f0;
      border-radius: 8px;
      background: #222;
    }

    #onibus {
      position: absolute;
      top: 300px; /* posição inicial */
      left: 160px;
      font-size: 2rem;
    }

    #alerta {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #ff0;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #0f0;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🚍 Simulação de Ônibus</h1>
  <div id="container">
    <div id="onibus">🚌</div>
  </div>
  <div id="alerta"></div>
  <button id="btnIniciar">Iniciar ônibus</button>

  <script>
    let posY = 300;
    const onibus = document.getElementById("onibus");
    const alerta = document.getElementById("alerta");
    let intervalo = null;

    function moverOnibus() {
      posY -= 5;
      onibus.style.top = posY + "px";

      if (posY <= 160 && posY > 140) {
        alerta.innerText = "🚨 Ônibus chegando ao ponto!";
      }

      if (posY <= 140) {
        alerta.innerText = "✅ Ônibus chegou!";
        clearInterval(intervalo);
        intervalo = null;
      }
    }

    function iniciarOnibus() {
      // resetar posição e alerta
      posY = 300;
      onibus.style.top = posY + "px";
      alerta.innerText = "";

      // se já tiver intervalo rodando, limpa antes
      if (intervalo) {
        clearInterval(intervalo);
      }

      // inicia novo intervalo
      intervalo = setInterval(moverOnibus, 500);
    }

    document.getElementById("btnIniciar").addEventListener("click", iniciarOnibus);
  </script>
</body>
</html>
